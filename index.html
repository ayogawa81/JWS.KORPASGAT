<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWS KORPASGAT V8 - BANDUNG REGENCY</title>
    <style>
        :root { --accent: #fbbf24; }
        * { box-sizing: border-box; }
        body { 
            margin: 0; background: #000 no-repeat center fixed; background-size: cover;
            color: white; font-family: 'Segoe UI', Arial, sans-serif; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* Desain Klasik Sesuai Gambar User */
        .top-bar { padding: 15px; text-align: center; background: rgba(0,0,0,0.7); border-bottom: 4px solid var(--accent); }
        #disp-nama { font-size: 3rem; font-weight: 900; color: var(--accent); margin: 0; letter-spacing: 4px; text-transform: uppercase; }

        .mid-section { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #jam { font-size: 11rem; font-weight: 900; font-family: 'Courier New', monospace; margin: 0; line-height: 1; }
        .date-box { font-size: 1.8rem; font-weight: bold; margin-top: 15px; }

        .sholat-container { display: flex; width: 100%; background: rgba(0,0,0,0.85); border-top: 2px solid rgba(255,255,255,0.2); }
        .card { flex: 1; padding: 25px 10px; text-align: center; border-right: 1px solid rgba(255,255,255,0.1); }
        .card h3 { margin: 0; font-size: 1.2rem; color: var(--accent); letter-spacing: 2px; }
        .card p { margin: 10px 0 0; font-size: 4rem; font-weight: 900; }

        marquee { background: #000; color: var(--accent); font-size: 2.2rem; font-weight: bold; padding: 10px 0; border-top: 3px solid var(--accent); }

        /* Panel Setting & Tanda Upload */
        #btn-set { position: fixed; top: 20px; right: 20px; width: 45px; height: 45px; background: rgba(0,0,0,0.6); border: 2px solid var(--accent); border-radius: 50%; color: var(--accent); cursor: pointer; z-index: 100; display: flex; align-items: center; justify-content: center; }
        #panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #333; padding: 25px; border-radius: 15px; width: 620px; z-index: 1000; box-shadow: 0 0 100px #000; max-height: 90vh; overflow-y: auto; }
        
        .box { background: #f8fafc; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .file-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #cbd5e1; }
        .status-tag { font-size: 11px; padding: 4px 10px; border-radius: 6px; font-weight: 900; }
        .ready { background: #dcfce7; color: #166534; border: 1px solid #166534; }
        .empty { background: #fee2e2; color: #991b1b; border: 1px solid #991b1b; }
        .btn-save { width: 100%; padding: 15px; background: #0f172a; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body onclick="pancingAudio()">

    <div id="btn-set" onclick="togglePanel()">⚙️</div>

    <div class="top-bar"><h1 id="disp-nama">STAFLOG KORPASGAT</h1></div>

    <div class="mid-section">
        <div id="jam">00:00:00</div>
        <div class="date-box"><span id="tgl"></span> | <span id="hijri" style="color:var(--accent)"></span></div>
    </div>

    <div class="sholat-container">
        <div class="card"><h3>SUBUH</h3><p id="subuh">04:31</p></div>
        <div class="card"><h3>DZUHUR</h3><p id="dzuhur">11:47</p></div>
        <div class="card"><h3>ASHAR</h3><p id="ashar">15:08</p></div>
        <div class="card"><h3>MAGHRIB</h3><p id="maghrib">17:43</p></div>
        <div class="card"><h3>ISYA</h3><p id="isya">18:54</p></div>
    </div>

    <marquee id="disp-run">KOMANDO!</marquee>

    <div id="panel">
        <h2 style="margin:0 0 15px 0; color:#0f172a; border-bottom:3px solid var(--accent)">⚙️ Setting Monitor</h2>
        
        <div class="box">
            <label><b>Teks Display:</b></label>
            <input type="text" id="in-nama" placeholder="Nama Satuan" style="width:100%; padding:10px; margin:5px 0;">
            <input type="text" id="in-run" placeholder="Running Text" style="width:100%; padding:10px; margin:5px 0;">
            <button class="btn-save" onclick="simpanTeks()">SIMPAN PERUBAHAN</button>
        </div>

        <div class="box">
            <label><b>Media (Tanda ✅ jika sudah upload):</b></label>
            <div class="file-row">
                <span style="width:100px; font-weight:bold;">Background</span>
                <input type="file" accept="image/*" onchange="upload('bg', this)">
                <span id="st-bg" class="status-tag empty">KOSONG</span>
            </div>
            <div class="file-row">
                <span style="width:100px; font-weight:bold;">Adzan</span>
                <input type="file" accept="audio/*" onchange="upload('adzan', this)">
                <span id="st-adzan" class="status-tag empty">KOSONG</span>
            </div>
            <div class="file-row">
                <span style="width:100px; font-weight:bold;">Tahrim</span>
                <input type="file" accept="audio/*" onchange="upload('tahrim', this)">
                <span id="st-tahrim" class="status-tag empty">KOSONG</span>
            </div>
        </div>
        <p style="font-size:12px; color:red;">*Data otomatis tersimpan di browser ini.</p>
        <button onclick="togglePanel()" style="width:100%; border:none; background:none; color:gray; cursor:pointer; padding:10px;">[ TUTUP ]</button>
    </div>

    <script>
        let db;
        const req = indexedDB.open("StaflogMasterDB", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("media", { keyPath: "id" });
        req.onsuccess = e => { db = e.target.result; loadData(); };

        function upload(id, input) {
            const file = input.files[0];
            if(!file) return;
            const tx = db.transaction("media", "readwrite");
            tx.objectStore("media").put({ id: id, data: file, name: file.name });
            tx.oncomplete = () => { 
                alert("File " + file.name + " berhasil disimpan!"); 
                location.reload(); 
            };
        }

        function loadData() {
            document.getElementById("disp-nama").innerText = localStorage.getItem("n") || "STAFLOG KORPASGAT";
            document.getElementById("disp-run").innerText = localStorage.getItem("r") || "KOMANDO!";
            
            const store = db.transaction("media", "readonly").objectStore("media");
            ['bg', 'adzan', 'tahrim'].forEach(id => {
                store.get(id).onsuccess = e => {
                    const res = e.target.result;
                    const tag = document.getElementById("st-" + id);
                    if(res && tag) {
                        tag.innerText = "✅ " + res.name;
                        tag.className = "status-tag ready";
                        if(id === 'bg') document.body.style.backgroundImage = `url(${URL.createObjectURL(res.data)})`;
                        if(id !== 'bg') {
                            const a = new Audio(URL.createObjectURL(res.data));
                            a.id = "audio-" + id;
                            document.body.appendChild(a);
                        }
                    }
                };
            });
        }

        function simpanTeks() {
            localStorage.setItem("n", document.getElementById("in-nama").value);
            localStorage.setItem("r", document.getElementById("in-run").value);
            location.reload();
        }

        function updateWaktu() {
            const d = new Date();
            const jamStr = d.toLocaleTimeString('id-ID', {hour12:false});
            document.getElementById('jam').innerText = jamStr;
            document.getElementById('tgl').innerText = d.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
            document.getElementById('hijri').innerText = new Intl.DateTimeFormat('id-ID-u-ca-islamic', {day:'numeric', month:'long', year:'numeric'}).format(d);

            if(d.getSeconds() === 0) {
                const jm = jamStr.substring(0, 5).replace('.', ':');
                // Cek waktu sholat Kab. Bandung hari ini
                const jadwal = ["04:31", "11:47", "15:08", "17:43", "18:54"];
                if(jadwal.includes(jm)) {
                    document.getElementById("audio-adzan")?.play();
                }
            }
        }

        function togglePanel() {
            const p = document.getElementById("panel");
            p.style.display = (p.style.display === "block") ? "none" : "block";
            document.getElementById("in-nama").value = localStorage.getItem("n") || "";
            document.getElementById("in-run").value = localStorage.getItem("r") || "";
        }

        function pancingAudio() {
            document.querySelectorAll("audio").forEach(a => {
                a.play().then(() => { a.pause(); a.currentTime = 0; }).catch(e => {});
            });
        }

        setInterval(updateWaktu, 1000);
    </script>
</body>
</html>
