<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAFLOG KORPASGAT - COMMAND V6</title>
    <style>
        :root { --accent: #fbbf24; --bg-blur: rgba(0, 0, 0, 0.8); }
        * { box-sizing: border-box; }
        body { 
            margin: 0; background: #000 no-repeat center fixed; background-size: cover;
            color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* UI Utama */
        .header { padding: 15px; text-align: center; background: var(--bg-blur); border-bottom: 3px solid var(--accent); }
        #disp-nama { font-size: 2.5rem; font-weight: 900; color: var(--accent); margin: 0; letter-spacing: 4px; }
        .main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #jam { font-size: 10rem; font-weight: 900; font-family: monospace; margin: 0; }
        .sholat-row { display: flex; width: 100%; background: var(--bg-blur); border-top: 1px solid rgba(255,255,255,0.1); }
        .card { flex: 1; padding: 20px; text-align: center; border-right: 1px solid rgba(255,255,255,0.1); }
        .card h3 { margin: 0; font-size: 1.1rem; color: var(--accent); }
        .card p { margin: 5px 0 0; font-size: 3.5rem; font-weight: 900; }
        marquee { font-size: 2rem; font-weight: bold; color: var(--accent); background: #000; padding: 10px 0; border-top: 2px solid var(--accent); }

        /* Icon Setting */
        #btn-set { position: fixed; top: 15px; right: 15px; width: 45px; height: 45px; background: rgba(0,0,0,0.6); border: 2px solid var(--accent); border-radius: 50%; color: var(--accent); cursor: pointer; z-index: 100; display: flex; align-items: center; justify-content: center; }

        /* Panel Setting Baru dengan Tanda File */
        #panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #333; padding: 25px; border-radius: 15px; width: 650px; z-index: 1000; box-shadow: 0 0 50px #000; }
        .input-group { margin-bottom: 15px; padding: 15px; background: #f8fafc; border-radius: 10px; border: 1px solid #e2e8f0; }
        .media-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding: 8px; border-bottom: 1px dashed #cbd5e1; }
        .media-label { font-weight: bold; width: 120px; font-size: 14px; }
        .status-tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        .status-ready { background: #dcfce7; color: #166534; } /* Hijau jika ada */
        .status-empty { background: #fee2e2; color: #991b1b; } /* Merah jika kosong */
        .btn-save { width: 100%; padding: 12px; background: #0f172a; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 8px; }
    </style>
</head>
<body onclick="aktifkanAudio()">

    </div>

        <div class="card"><h3>ASHAR</h3><p>15:12</p></div>
        <div class="card"><h3>MAGHRIB</h3><p>17:48</p></div>
        <div class="card"><h3>ISYA</h3><p>18:58</p></div>
    </div>

    <marquee id="disp-run">KOMANDO!</marquee>
