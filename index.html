<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWS KORPASGAT - PC OPTIMIZED</title>
    <style>
        :root { --accent: #fbbf24; --active: #ef4444; }
        
        body { 
            margin: 0; background: #000 no-repeat center center fixed; background-size: cover;
            color: white; font-family: 'Arial', sans-serif;
            height: 100vh; width: 100vw; overflow: hidden; 
            display: flex; flex-direction: column; cursor: pointer;
        }

        /* Header Dikecilkan agar Proporsional */
        .header { padding: 15px 0; text-align: center; border-bottom: 4px solid var(--accent); background: rgba(0,0,0,0.85); }
        #disp-nama { font-size: 3.5rem; font-weight: 900; color: var(--accent); margin: 0; text-transform: uppercase; letter-spacing: 2px; }

        /* Area Jam Utama (Optimasi Ukuran PC) */
        .main-display { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 0; }
        #jam { font-size: 14rem; font-weight: 900; margin: 0; line-height: 1; text-shadow: 4px 4px 10px rgba(0,0,0,0.9); }
        #iqomah-box { font-size: 12rem; color: var(--active); font-weight: 900; display: none; }

        /* Bar Tanggal Sesuai Foto */
        .info-bar { background: rgba(0,0,0,0.7); padding: 8px 40px; border: 2px solid var(--accent); border-radius: 50px; margin-top: 5px; text-align: center; }
        #tgl { font-size: 2rem; font-weight: 900; display: block; }
        #hijri { font-size: 1.4rem; color: var(--accent); font-weight: bold; }

        /* Jadwal Sholat (Fixed Height agar tidak terpotong) */
        .prayer-row { display: flex; width: 100%; background: rgba(0,0,0,0.95); border-top: 4px solid var(--accent); height: 160px; }
        .card { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; border-right: 1px solid #333; }
        .card.active-now { background: var(--active) !important; }
        .card h3 { margin: 0; font-size: 1.4rem; color: var(--accent); font-weight: 900; }
        .card p { margin: 5px 0 0; font-size: 4rem; font-weight: 900; }

        /* Panel Pengaturan Standar */
        #btn-set { position: fixed; top: 20px; right: 20px; z-index: 100; font-size: 25px; opacity: 0.4; }
        #panel { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 500px; max-height: 80vh; background: white; color: #333; padding: 25px; 
            border-radius: 12px; z-index: 1000; box-shadow: 0 0 40px #000; overflow-y: auto;
        }
        .sec-label { font-weight: bold; font-size: 14px; margin-bottom: 5px; color: #1c2434; display: block; border-bottom: 2px solid var(--accent); }
        input { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .file-box { background: #f4f4f4; padding: 10px; border-radius: 6px; margin-bottom: 10px; font-size: 13px; }
        .btn-save { background: #1c2434; color: white; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 6px; font-size: 1.1rem; }
    </style>
</head>
<body onclick="startAudio()">

    <div id="btn-set" onclick="togglePanel()">⚙️</div>

    <div class="header">
        <h1 id="disp-nama">STAFLOG KORPASGAT</h1>
    </div>

    <div class="main-display">
        <div id="jam">00:00:00</div>
        <div id="iqomah-box">00:00</div>
        <div class="info-bar">
            <span id="tgl">SELASA, 28 APRIL 2026</span>
            <span id="hijri">11 ZULKAIDAH 1447 H</span>
        </div>
    </div>

    <div class="prayer-row">
        <div class="card" id="card-subuh"><h3>SUBUH</h3><p id="t-subuh">04:31</p></div>
        <div class="card" id="card-dzuhur"><h3>DZUHUR</h3><p id="t-dzuhur">11:47</p></div>
        <div class="card" id="card-ashar"><h3>ASHAR</h3><p id="t-ashar">15:08</p></div>
        <div class="card" id="card-maghrib"><h3>MAGHRIB</h3><p id="t-maghrib">17:43</p></div>
        <div class="card" id="card-isya"><h3>ISYA</h3><p id="t-isya">18:54</p></div>
    </div>

    <div id="panel">
        <h2 style="text-align:center; margin-top:0;">KONFIGURASI JWS</h2>
        <span class="sec-label">DATA SATUAN & LOKASI</span>
        <input type="text" id="in-nama" placeholder="Nama Satuan">
        <div style="display:flex; gap:10px;">
            <input type="text" id="in-lat" placeholder="Latitude (-7.01)">
            <input type="text" id="in-lon" placeholder="Longitude (107.55)">
        </div>

        <span class="sec-label">UPLOAD MEDIA</span>
        <div class="file-box">
            Background: <input type="file" onchange="upFile('bg', this)"><br>
            Adzan Isya: <input type="file" onchange="upFile('a-isya', this)">
        </div>

        <span class="sec-label">WAKTU IQOMAH (MENIT)</span>
        <input type="number" id="in-iqo" placeholder="Contoh: 10">

        <button class="btn-save" onclick="saveData()">SIMPAN PERUBAHAN</button>
        <p onclick="togglePanel()" style="text-align:center; cursor:pointer; color:red; margin-top:15px; font-weight:bold;">[ TUTUP ]</p>
    </div>

    <script>
        let db;
        const request = indexedDB.open("JWS_PC_FINAL", 1);
        request.onupgradeneeded = e => e.target.result.createObjectStore("files", { keyPath: "id" });
        request.onsuccess = e => { db = e.target.result; muatData(); };

        function muatData() {
            document.getElementById("disp-nama").innerText = localStorage.getItem("nSatuan") || "STAFLOG KORPASGAT";
            document.getElementById("in-nama").value = localStorage.getItem("nSatuan") || "";
            document.getElementById("in-lat").value = localStorage.getItem("lat") || "-7.01";
            document.getElementById("in-lon").value = localStorage.getItem("lon") || "107.551";
            document.getElementById("in-iqo").value = localStorage.getItem("durIqo") || "10";
            
            const store = db.transaction("files", "readonly").objectStore("files");
            store.get('bg').onsuccess = e => {
                if(e.target.result) document.body.style.backgroundImage = `url(${URL.createObjectURL(e.target.result.data)})`;
            };
        }

        function upFile(id, input) {
            const tx = db.transaction("files", "readwrite");
            tx.objectStore("files").put({ id: id, data: input.files[0] });
            alert("File Berhasil Disimpan!");
        }

        function saveData() {
            localStorage.setItem("nSatuan", document.getElementById("in-nama").value);
            localStorage.setItem("lat", document.getElementById("in-lat").value);
            localStorage.setItem("lon", document.getElementById("in-lon").value);
            localStorage.setItem("durIqo", document.getElementById("in-iqo").value);
            location.reload();
        }

        function runClock() {
            const now = new Date();
            document.getElementById('jam').innerText = now.toLocaleTimeString('id-ID', {hour12:false}).replace(/\./g, ':');
            document.getElementById('tgl').innerText = now.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'}).toUpperCase();
            document.getElementById('hijri').innerText = new Intl.DateTimeFormat('id-ID-u-ca-islamic', {day:'numeric', month:'long', year:'numeric'}).format(now).toUpperCase();
        }

        function togglePanel() {
            const p = document.getElementById("panel");
            p.style.display = (p.style.display === "block") ? "none" : "block";
        }

        function startAudio() { document.querySelectorAll("audio").forEach(a => a.play().then(()=>a.pause())); }
        setInterval(runClock, 1000);
    </script>
</body>
</html>
