<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAFLOG KORPASGAT - MONITORING V3.5</title>
    <style>
        :root { 
            --bg-img: url('https://images.unsplash.com/photo-1533106497176-45ae19e68ba2?q=80&w=2070'); 
            --accent: #fbbf24; /* Gold/Jingga Komando */
        }
        body { 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), var(--bg-img); 
            background-size: cover; background-position: center; color: white; 
            font-family: 'Segoe UI', Arial, sans-serif; margin: 0; overflow: hidden; height: 100vh;
        }
        
        /* Header */
        .header { text-align: center; padding: 25px 0; border-bottom: 4px solid var(--accent); background: rgba(0,0,0,0.6); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #disp-nama { font-size: 3.2rem; color: var(--accent); margin: 0; font-weight: 900; letter-spacing: 6px; text-shadow: 2px 2px 10px rgba(0,0,0,1); }
        
        /* Jam Section */
        .clock-box { display: flex; align-items: center; justify-content: center; gap: 50px; margin: 15px 0; }
        #jam { font-size: 9rem; font-weight: 900; font-family: 'Courier New', monospace; letter-spacing: -5px; }
        
        #analog { width: 140px; height: 140px; border: 5px solid var(--accent); border-radius: 50%; position: relative; background: rgba(255,255,255,0.05); box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 10px; transform: translateX(-50%); }
        .h-h { width: 7px; height: 35px; background: white; z-index: 3; }
        .m-h { width: 5px; height: 55px; background: #bbb; z-index: 2; }
        .s-h { width: 2px; height: 65px; background: #ff4444; z-index: 1; }

        /* Jadwal Sholat Cards */
        .sholat-container { display: flex; gap: 20px; padding: 0 50px; margin-top: 30px; }
        .card { 
            background: rgba(255,255,255,0.07); 
            backdrop-filter: blur(15px); 
            padding: 30px 10px; 
            border-radius: 20px; 
            flex: 1; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.1);
            border-bottom: 8px solid var(--accent);
            transition: 0.3s;
        }
        .card h3 { margin: 0; font-size: 1.5rem; color: var(--accent); letter-spacing: 2px; }
        .card p { font-size: 4rem; margin: 15px 0 0; font-weight: 900; color: #fff; }

        /* Running Text */
        .footer-scroll { font-size: 2.5rem; position: fixed; bottom: 0; background: #000; padding: 18px 0; width: 100%; border-top: 4px solid var(--accent); font-weight: bold; color: var(--accent); }

        /* Panel Setting */
        #btn-set { position: fixed; top: 25px; right: 25px; width: 60px; height: 60px; background: rgba(0,0,0,0.7); border: 2px solid var(--accent); border-radius: 50%; color: var(--accent); cursor: pointer; z-index: 100; font-size: 30px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        #btn-set:hover { background: var(--accent); color: black; }
        
        #panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; color: #1e293b; padding: 35px; border-radius: 25px; width: 700px; max-height: 85vh; overflow-y: auto; box-shadow: 0 0 150px rgba(0,0,0,0.9); z-index: 1000; border: 5px solid var(--accent); }
        .group { margin-bottom: 20px; background: #f1f5f9; padding: 15px; border-radius: 12px; }
        .group label { font-weight: bold; display: block; margin-bottom: 10px; color: #0f172a; border-bottom: 2px solid #cbd5e1; }
        input[type="text"], textarea { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 1rem; }
        .audio-item { display: flex; align-items: center; justify-content: space-between; padding: 8px; background: white; margin-bottom: 5px; border-radius: 6px; border: 1px solid #e2e8f0; font-size: 14px; }
        .btn-action { width: 100%; padding: 15px; background: #0f172a; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body onclick="aktifkanFiturAudio()">

    <div id="btn-set" onclick="bukaTutupPanel()">⚙️</div>

    <div class="header">
        <h1 id="disp-nama">STAFLOG KORPASGAT</h1>
        <div class="clock-box">
            <div id="analog">
                <div id="h-h" class="hand h-h"></div>
                <div id="m-h" class="hand m-h"></div>
                <div id="s-h" class="hand s-h"></div>
            </div>
            <div id="jam">00:00:00</div>
        </div>
        <div style="font-size: 1.8rem; font-weight: bold;"><span id="tgl"></span> | <span id="hijri" style="color:var(--accent)"></span></div>
    </div>

    <div class="sholat-container">
        <div class="card"><h3>SUBUH</h3><p id="subuh">04:35</p></div>
        <div class="card"><h3>DZUHUR</h3><p id="dzuhur">11:52</p></div>
        <div class="card"><h3>ASHAR</h3><p id="ashar">15:12</p></div>
        <div class="card"><h3>MAGHRIB</h3><p id="maghrib">17:48</p></div>
        <div class="card"><h3>ISYA</h3><p id="isya">18:58</p></div>
    </div>

    <marquee class="footer-scroll" id="disp-run">STAFLOG KORPASGAT - DISIPLIN ADALAH NAFASKU - KOMANDO!</marquee>

    <div id="panel">
        <h2 style="margin:0 0 20px 0; color:#0f172a; text-align:center;">PENGATURAN MONITOR KOMANDO</h2>
        
        <div class="group">
            <label>IDENTITAS & INFORMASI</label>
            <input type="text" id="in-nama" placeholder="Nama Satuan (Contoh: STAFLOG KORPASGAT)">
            <input type="text" id="in-run" placeholder="Running Text Bawah">
            <button class="btn-action" onclick="simpanTeks()">UPDATE DATA TEKS</button>
        </div>

        <div class="group">
            <label>MULTIMEDIA (AUTO-SAVE)</label>
            <div class="audio-item">Ganti Background: <input type="file" accept="image/*" onchange="simpanMedia('bg', this)"></div>
            <div class="audio-item">Suara Tahrim: <input type="file" accept="audio/*" onchange="simpanMedia('tahrim', this)"></div>
            <hr>
            <div class="audio-item">Adzan Subuh: <input type="file" accept="audio/*" onchange="simpanMedia('subuh_mp3', this)"></div>
            <div class="audio-item">Adzan Dzuhur: <input type="file" accept="audio/*" onchange="simpanMedia('dzuhur_mp3', this)"></div>
            <div class="audio-item">Adzan Ashar: <input type="file" accept="audio/*" onchange="simpanMedia('ashar_mp3', this)"></div>
            <div class="audio-item">Adzan Maghrib: <input type="file" accept="audio/*" onchange="simpanMedia('maghrib_mp3', this)"></div>
            <div class="audio-item">Adzan Isya: <input type="file" accept="audio/*" onchange="simpanMedia('isya_mp3', this)"></div>
        </div>
        
        <button onclick="bukaTutupPanel()" style="width:100%; border:none; background:none; color:red; cursor:pointer; font-weight:bold;">[ TUTUP PENGATURAN ]</button>
    </div>

    <script>
        let db;
        const sholatList = ["subuh", "dzuhur", "ashar", "maghrib", "isya"];

        // 1. Database Initialization
        const req = indexedDB.open("Korpasgat_Command_DB", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("files", { keyPath: "id" });
        req.onsuccess = e => { db = e.target.result; muatSemuaData(); };

        // 2. Load and Save Functions
        function simpanMedia(id, input) {
            const file = input.files[0];
            if(!file) return;
            const tx = db.transaction("files", "readwrite");
            tx.objectStore("files").put({ id: id, data: file });
            tx.oncomplete = () => { alert("File " + id.replace('_mp3','') + " Terenkripsi & Tersimpan!"); location.reload(); };
        }

        function muatSemuaData() {
            document.getElementById("disp-nama").innerText = localStorage.getItem("nama") || "STAFLOG KORPASGAT";
            document.getElementById("disp-run").innerText = localStorage.getItem("run") || "KOMANDO!";

            const store = db.transaction("files", "readonly").objectStore("files");
            
            // BG Image
            store.get("bg").onsuccess = e => {
                if(e.target.result) document.documentElement.style.setProperty('--bg-img', `url(${URL.createObjectURL(e.target.result.data)})`);
            };

            // Audio Files
            ["tahrim", "subuh_mp3", "dzuhur_mp3", "ashar_mp3", "maghrib_mp3", "isya_mp3"].forEach(k => {
                store.get(k).onsuccess = e => {
                    if(e.target.result) {
                        const a = new Audio(URL.createObjectURL(e.target.result.data));
                        a.id = "audio-" + k;
                        document.body.appendChild(a);
                    }
                };
            });
        }

        function simpanTeks() {
            localStorage.setItem("nama", document.getElementById("in-nama").value);
            localStorage.setItem("run", document.getElementById("in-run").value);
            alert("Informasi Teks Berhasil Diperbarui!"); location.reload();
        }
