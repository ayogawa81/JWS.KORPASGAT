<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>MASTER KOMANDO - STAFLOG KORPASGAT</title>
    <style>
        :root { --bg-img: url('https://images.unsplash.com/photo-1534067783941-51c9c23ecefd?q=80&w=2000'); }
        body { 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), var(--bg-img); 
            background-size: cover; background-position: center; color: white; 
            font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; 
            height: 100vh; text-align: center; cursor: pointer; 
        }
        
        /* HEADER & JAM */
        .header { padding: 20px 0; background: rgba(0,0,0,0.4); border-bottom: 3px solid #fbbf24; }
        #disp-nama { font-size: 2.5rem; color: #fbbf24; margin: 0; text-transform: uppercase; letter-spacing: 3px; }
        #jam { font-size: 8.5rem; font-weight: bold; line-height: 1; margin: 10px 0; font-family: 'Courier New', monospace; }
        #tanggal { font-size: 1.6rem; margin-bottom: 5px; opacity: 0.9; }

        /* JADWAL SHOLAT */
        .sholat-grid { display: flex; gap: 15px; width: 95%; margin: 40px auto; justify-content: center; }
        .box { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 25px; border-radius: 20px; flex: 1; border-bottom: 8px solid #fbbf24; min-width: 160px; }
        .box h3 { margin: 0; font-size: 1.3rem; letter-spacing: 1px; }
        .box p { font-size: 3.2rem; margin: 15px 0 0 0; font-weight: bold; }

        /* RUNNING TEXT (PERBAIKAN LEBAR) */
        marquee { 
            position: fixed; bottom: 0; left: 0; width: 100vw; 
            background: #000; padding: 15px 0; font-size: 2rem; 
            border-top: 3px solid #fbbf24; z-index: 999; margin: 0;
        }

        /* PANEL SETTING */
        #btn-menu { position: fixed; top: 20px; right: 20px; width: 50px; height: 50px; background: rgba(251, 191, 36, 0.3); border: 2px solid #fbbf24; border-radius: 50%; color: #fbbf24; font-size: 25px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        #admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #333; padding: 25px; border-radius: 15px; z-index: 10000; width: 600px; max-height: 85vh; overflow-y: auto; box-shadow: 0 0 100px #000; text-align: left; }
        .row-item { background: #f1f5f9; padding: 15px; margin-bottom: 12px; border-radius: 10px; border-left: 5px solid #fbbf24; }
        input { width: 95%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
        .btn-action { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 5px; color: white; }
