<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWS KORPASGAT V32 FIX TV</title>
    <style>
        :root { --accent: #fbbf24; --active: #ef4444; }
        body { 
            margin: 0; background: #000 url('https://i.postimg.cc/T32xKDtZ/Picture2.jpg') no-repeat center fixed; 
            background-size: cover; color: white; font-family: Arial, sans-serif; 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column; cursor: pointer;
        }
        .header { padding: 10px; text-align: center; background: rgba(0,0,0,0.8); border-bottom: 4px solid var(--accent); }
        #n-satuan { font-size: 3.5rem; font-weight: 900; color: var(--accent); margin: 0; text-transform: uppercase; }
        #jam { font-size: 11rem; font-weight: 900; text-align: center; flex: 1; display: flex; align-items: center; justify-content: center; text-shadow: 5px 5px 20px #000; margin-bottom: -20px; }
        #tgl-container { text-align: center; margin-bottom: 20px; }
        #tgl-masehi { font-size: 2.5rem; font-weight: bold; background: rgba(0,0,0,0.6); padding: 5px 30px; border-radius: 50px; border: 2px solid var(--accent); display: inline-block; margin-right: 10px; }
        #tgl-hijriah { font-size: 2.5rem; font-weight: bold; color: var(--accent); background: rgba(0,0,0,0.8); padding: 5px 30px; border-radius: 50px; border: 2px solid white; display: inline-block; }
        .prayer-row { display: flex; background: rgba(0,0,0,0.9); border-top: 4px solid var(--accent); }
        .card { flex: 1; padding: 20px 10px; text-align: center; border-right: 1px solid #333; }
        .active-now { background: var(--active) !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.7; } }
        .card h3 { margin: 0; font-size: 1.3rem; color: var(--accent); }
        .card p { margin: 5px 0 0; font-size: 3.5rem; font-weight: 900; }
        marquee { background: #000; color: var(--accent); font-size: 2.5rem; font-weight: bold; padding: 10px 0; border-top: 4px solid var(--accent); }
        #panel { display: none; position: fixed; top: 5%; left: 5%; width: 90%; height: 85%; background: #f4f4f4; color: #333; padding: 25px; border-radius: 15px; z-index: 1000; overflow-y: auto; }
        .box { border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; border-radius: 8px; background: white; }
        input { width: 95%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .btn-save { background: #1e3a8a; color: white; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 20px; }
        #audio-status { position: fixed; bottom: 80px; right: 20px; font-size: 12px; color: #0f0; display: none; }
    </style>
</head>
<body onclick="aktifkanAudio()" onkeydown="aktifkanAudio()">

    <audio id="mainPlayer" preload="auto"></audio>
    <div id="audio-status">● Audio Ready</div>

    <div style="position:fixed; top:20px; right:20px; font-size:30px; z-index:100;" onclick="togglePanel()">⚙️</div>
    <div class="header"><h1 id="n-satuan">STAFLOG KORPASGAT</h1></div>

    <div id="jam">00:00:00</div>
    
    <div id="tgl-container">
        <div id="tgl-masehi">...</div>
        <div id="tgl-hijriah">...</div>
    </div>

    <div class="prayer-row">
        <div class="card" id="c-subuh"><h3>SUBUH</h3><p id="t-subuh">04:31</p></div>
        <div class="card" id="c-dzuhur"><h3>DZUHUR</h3><p id="t-dzuhur">11:47</p></div>
        <div class="card" id="c-ashar"><h3>ASHAR</h3><p id="t-ashar">15:08</p></div>
        <div class="card" id="c-maghrib"><h3>MAGHRIB</h3><p id="t-maghrib">17:43</p></div>
        <div class="card" id="c-isya"><h3>ISYA</h3><p id="t-isya">18:54</p></div>
    </div>

    <marquee id="disp-run">KOMANDO!</marquee>

    <div id="panel">
        <h2 style="text-align:center;">⚙️ PENGATURAN JWS</h2>
        <div class="box">
            <b>Identitas & Pesan</b>
            <input type="text" id="in-nama" placeholder="Nama Satuan">
            <input type="text" id="in-run" placeholder="Running Text">
        </div>
        <div class="box">
            <b>🕌 Link Audio (Raw GitHub / MP3)</b>
            <input type="text" id="in-subuh" placeholder="Link Subuh">
            <input type="text" id="in-dzuhur" placeholder="Link Dzuhur">
            <input type="text" id="in-ashar" placeholder="Link Ashar">
            <input type="text" id="in-maghrib" placeholder="Link Maghrib">
            <input type="text" id="in-isya" placeholder="Link Isya">
        </div>
        <button class="btn-save" onclick="saveData()">SIMPAN & REFRESH</button>
        <p onclick="togglePanel()" style="text-align:center; color:gray; cursor:pointer;">[ TUTUP ]</p>
    </div>

    <script>
        const player = document.getElementById('mainPlayer');
        let audioReady = false;
        let sudahBunyi = "";

        function getHijri() {
            const date = new Date();
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            const masehi = new Intl.DateTimeFormat('id-ID', { weekday: 'long', ...options }).format(date);
            document.getElementById('tgl-masehi').innerText = masehi;

            try {
                const hijriDate = new Intl.DateTimeFormat('id-ID-u-ca-islamic-umalqura', options).format(date);
                document.getElementById('tgl-hijriah').innerText = hijriDate + " H";
            } catch(e) {
                document.getElementById('tgl-hijriah').innerText = "Update Hijriah...";
            }
        }

        function muatSistem() {
            getHijri();
            document.getElementById('n-satuan').innerText = localStorage.getItem('nSatuan') || "STAFLOG KORPASGAT";
            document.getElementById('in-nama').value = localStorage.getItem('nSatuan') || "STAFLOG KORPASGAT";
            document.getElementById('disp-run').innerText = localStorage.getItem('tJalan') || "KOMANDO!";
            document.getElementById('in-run').value = localStorage.getItem('tJalan') || "KOMANDO!";
            ["subuh", "dzuhur", "ashar", "maghrib", "isya"].forEach(s => {
                document.getElementById('in-' + s).value = localStorage.getItem('s-' + s) || "";
            });
        }
