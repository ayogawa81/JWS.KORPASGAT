<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>MASTER KOMANDO - STAFLOG KORPASGAT</title>
    <style>
        :root { --bg-img: url('https://images.unsplash.com/photo-1534067783941-51c9c23ecefd?q=80&w=2000'); }
        body { 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), var(--bg-img); 
            background-size: cover; background-position: center; color: white; 
            font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; 
            height: 100vh; text-align: center; cursor: pointer; 
        }
        
        .header { padding: 15px 0; background: rgba(0,0,0,0.4); border-bottom: 3px solid #fbbf24; }
        #disp-nama { font-size: 2.2rem; color: #fbbf24; margin: 0; text-transform: uppercase; letter-spacing: 3px; }
        #jam { font-size: 8rem; font-weight: bold; line-height: 1; margin: 10px 0; font-family: 'Courier New', monospace; }
        #tanggal-masehi { font-size: 1.5rem; opacity: 0.9; }
        #tanggal-hijriah { font-size: 1.3rem; color: #fbbf24; margin-top: 5px; font-weight: 500; }

        .sholat-grid { display: flex; gap: 15px; width: 95%; margin: 30px auto; justify-content: center; }
        .box { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; flex: 1; border-bottom: 6px solid #fbbf24; min-width: 150px; }
        .box h3 { margin: 0; font-size: 1.2rem; }
        .box p { font-size: 3rem; margin: 10px 0 0 0; font-weight: bold; }

        .marquee-container { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; border-top: 3px solid #fbbf24; z-index: 999; }
        marquee { font-size: 1.8rem; padding: 12px 0; display: block; width: 100%; color: white; }

        #btn-menu { position: fixed; top: 20px; right: 20px; width: 45px; height: 45px; background: rgba(251, 191, 36, 0.3); border: 2px solid #fbbf24; border-radius: 50%; color: #fbbf24; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        #admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #333; padding: 25px; border-radius: 15px; z-index: 10001; width: 550px; max-height: 80vh; overflow-y: auto; box-shadow: 0 0 50px rgba(0,0,0,0.5); text-align: left; }
        .row-item { background: #f8fafc; padding: 12px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #fbbf24; }
        input { width: 92%; padding: 8px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; }
        .btn-green { background: #22c55e; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 5px; }
        .btn-blue { background: #3b82f6; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 5px; }
        .btn-red { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body onclick="pancingSuara()">

    <div id="btn-menu" onclick="bukaSetting()">⚙️</div>

    <div class="header">
        <h1 id="disp-nama">STAFLOG KORPASGAT</h1>
        <div id="jam">00:00:00</div>
        <div id="tanggal-masehi">Memuat Tanggal...</div>
        <div id="tanggal-hijriah">Memuat Kalender Islam...</div>
    </div>

    <div class="sholat-grid">
        <div class="box"><h3>SUBUH</h3><p id="subuh">04:35</p></div>
        <div class="box"><h3>DZUHUR</h3><p id="dzuhur">11:52</p></div>
        <div class="box)<h3>ASHAR</h3><p id="ashar">15:10</p></div>
        <div class="box"><h3>MAGHRIB</h3><p id="maghrib">17:48</p></div>
        <div class="box"><h3>ISYA</h3><p id="isya">18:59</p></div>
    </div>

    <div class="marquee-container">
        <marquee id="disp-run" scrollamount="8">STAFLOG KORPASGAT - DISIPLIN ADALAH NAFASKU</marquee>
    </div>

    <div id="admin-panel">
        <h2 style="margin-top:0;">⚙️ Pengaturan JWS</h2>
        <div class="row-item">
            <b>1. Identitas & Teks</b><br>
            <input type="text" id="in-nama" placeholder="Nama Satuan">
            <input type="text" id="in-run" placeholder="Running Text">
            <button class="btn-green" onclick="simpanTeks()">SIMPAN</button>
        </div>
        <div class="row-item">
            <b>2. Background</b><br>
            <input type="file" id="in-bg" accept="image/*">
            <button class="btn-blue" onclick="uploadBG()">UPLOAD</button>
        </div>
        <div class="row-item">
            <b>3. Audio & Tes Suara</b>
            <div id="audio-list" style="margin-top:10px;"></div>
        </div>
        <button onclick="tutupSetting()" style="width:100%; padding:10px; border:none; cursor:pointer; font-weight:bold; background:#ddd;">TUTUP</button>
    </div>

    <script>
        const audioKeys = ["tahrim", "subuh", "dzuhur", "ashar", "maghrib", "isya"];
        let db; let audioMap = {}; 

        const req = indexedDB.open("JWS_KORPASGAT_FINAL", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("files", { keyPath: "id" });
        req.onsuccess = e => { db = e.target.result; muatApp(); };

        function muatApp() {
            document.getElementById("disp-nama").innerText = localStorage.getItem("nama") || "STAFLOG KORPASGAT";
            document.getElementById("disp-run").innerText = localStorage.getItem("run") || "STAFLOG KORPASGAT - DISIPLIN ADALAH NAFASKU";

            const tx = db.transaction("files", "readonly").objectStore("files");
            tx.get("bg").onsuccess = e => {
                if(e.target.result) document.documentElement.style.setProperty('--bg-img', `url(${URL.createObjectURL(e.target.result.data)})`);
            };

            audioKeys.forEach(k => {
                tx.get(k).onsuccess = e => {
                    if(e.target.result) audioMap[k] = new Audio(URL.createObjectURL(e.target.result.data));
                };
            });

            setInterval(updateSistem, 1000);
            updateSistem();
        }

        function updateSistem() {
            const d = new Date();
            const jamStr = d.toLocaleTimeString('id-ID', {hour12:false}).replace(/\./g, ':');
            document.getElementById('jam').innerText = jamStr;
            document.getElementById('tanggal-masehi').innerText = d.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
            
            // Perbaikan Kalender Hijriah
            try {
                const h = new Intl.DateTimeFormat('id-TN-u-ca-islamic-uma', {day:'numeric', month:'long', year:'numeric'}).format(d);
                document.getElementById('tanggal-hijriah').innerText = h + " H";
            } catch(e) { document.getElementById('tanggal-hijriah').innerText = "Gagal memuat Hijriah"; }

            if(d.getSeconds() === 0) {
                const jm = jamStr.substring(0,5);
                ["subuh","dzuhur","ashar","maghrib","isya"].forEach(s => {
                    if(jm === document.getElementById(s).innerText) audioMap[s]?.play();
                });
            }
        }

        function simpanTeks() {
            localStorage.setItem("nama", document.getElementById("in-nama").value);
            localStorage.setItem("run", document.getElementById("in-run").value);
            location.reload();
        }

        function uploadBG() {
            const f = document.getElementById("in-bg").files[0];
            if(!f) return;
            db.transaction("files", "readwrite").objectStore("files").put({id: "bg", data: f}).onsuccess = () => location.reload();
        }

        function uploadAudio(k) {
            const f = document.getElementById('f-'+k).files[0];
            if(!f) return;
            db.transaction("files", "readwrite").objectStore("files").put({id: k, data: f}).onsuccess = () => location.reload();
        }

        function tesSuara(k) {
            if(audioMap[k]) { audioMap[k].currentTime = 0; audioMap[k].play(); }
            else alert("Audio belum ada!");
        }

        function stopSuara(k) { if(audioMap[k])
