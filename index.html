<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWS KORPASGAT - RECOVERY VERSION</title>
    <style>
        :root { --accent: #fbbf24; --active: #ef4444; }
        
        body { 
            margin: 0; background: #000 no-repeat center center fixed; background-size: cover;
            color: white; font-family: 'Arial', sans-serif;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column; cursor: pointer;
        }

        /* Header Klasik STAF LOG */
        .header { padding: 25px 0; text-align: center; border-bottom: 5px solid var(--accent); background: rgba(0,0,0,0.8); }
        #disp-nama { font-size: 5rem; font-weight: 900; color: var(--accent); margin: 0; text-transform: uppercase; }

        /* Area Jam Dominan */
        .main-display { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #jam { font-size: 18rem; font-weight: 900; margin: 0; line-height: 1; text-shadow: 5px 5px 15px rgba(0,0,0,0.9); }
        #iqomah-box { font-size: 15rem; color: var(--active); font-weight: 900; display: none; }

        /* Baris Informasi & Tanggal */
        .info-bar { background: rgba(0,0,0,0.7); padding: 10px 50px; border: 3px solid var(--accent); border-radius: 50px; margin-top: 10px; text-align: center; }
        #tgl { font-size: 2.5rem; font-weight: 900; display: block; }
        #hijri { font-size: 1.8rem; color: var(--accent); font-weight: bold; }

        /* Jadwal Sholat */
        .prayer-row { display: flex; width: 100%; background: rgba(0,0,0,0.9); border-top: 5px solid var(--accent); }
        .card { flex: 1; padding: 25px 0; text-align: center; border-right: 2px solid #333; }
        .card.active-now { background: var(--active) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.6; } }
        .card h3 { margin: 0; font-size: 1.8rem; color: var(--accent); font-weight: 900; }
        .card p { margin: 10px 0 0; font-size: 5.5rem; font-weight: 900; }

        /* Panel Setting Yang Diperbaiki */
        #btn-set { position: fixed; top: 30px; right: 30px; z-index: 100; font-size: 30px; opacity: 0.4; }
        #panel { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 550px; max-height: 85vh; background: white; color: #333; padding: 30px; 
            border-radius: 15px; z-index: 1000; box-shadow: 0 0 50px #000; overflow-y: auto;
        }
        .sec-title { font-weight: bold; color: #1c2434; border-bottom: 2px solid var(--accent); margin: 15px 0 10px 0; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .file-item { display: flex; justify-content: space-between; align-items: center; background: #f9f9f9; padding: 8px; margin-bottom: 5px; border-radius: 5px; font-size: 14px; }
        .btn-save { background: #1c2434; color: white; border: none; padding: 18px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 1.2rem; margin-top: 15px; }
    </style>
</head>
<body onclick="startAudio()">

    <div id="btn-set" onclick="togglePanel()">⚙️</div>

    <div class="header">
        <h1 id="disp-nama">STAFLOG KORPASGAT</h1>
    </div>

    <div class="main-display">
        <div id="jam">00:00:00</div>
        <div id="iqomah-box">00:00</div>
        <div class="info-bar">
            <span id="tgl">KAMIS, 28 MEI 2026</span>
            <span id="hijri">11 DZULQA'DAH 1447 H</span>
        </div>
    </div>

    <div class="prayer-row">
        <div class="card" id="card-subuh"><h3>SUBUH</h3><p id="t-subuh">04:31</p></div>
        <div class="card" id="card-dzuhur"><h3>DZUHUR</h3><p id="t-dzuhur">11:47</p></div>
        <div class="card" id="card-ashar"><h3>ASHAR</h3><p id="t-ashar">15:08</p></div>
        <div class="card" id="card-maghrib"><h3>MAGHRIB</h3><p id="t-maghrib">17:43</p></div>
        <div class="card" id="card-isya"><h3>ISYA</h3><p id="t-isya">18:54</p></div>
    </div>

    <div id="panel">
        <h2 style="text-align:center; margin-top:0;">PENGATURAN SISTEM</h2>
        
        <div class="sec-title">📍 Nama Satuan & Lokasi</div>
        <input type="text" id="in-nama" placeholder="Nama Satuan (Contoh: STAFLOG)">
        <div style="display:flex; gap:10px;">
            <input type="text" id="in-lat" placeholder="Latitude (-7.02)">
            <input type="text" id="in-lon" placeholder="Longitude (107.52)">
        </div>

        <div class="sec-title">🎵 Media & Adzan (Pilih File)</div>
        <div class="file-item"><span>Background</span><input type="file" onchange="upFile('bg', this)" style="width:150px;"></div>
        <div class="file-item"><span>Adzan Subuh</span><input type="file" onchange="upFile('a-subuh', this)" style="width:150px;"></div>
        <div class="file-item"><span>Adzan Maghrib</span><input type="file" onchange="upFile('a-maghrib', this)" style="width:150px;"></div>

        <div class="sec-title">⏲️ Jeda Iqomah (Menit)</div>
        <input type="number" id="in-iqo" placeholder="Contoh: 10">

        <button class="btn-save" onclick="saveSemua()">SIMPAN SEMUA PERUBAHAN</button>
        <p onclick="togglePanel()" style="text-align:center; cursor:pointer; color:red; font-weight:bold; margin-top:15px;">[ TUTUP ]</p>
    </div>

    <script>
        let db, iqoCount = 0, isIqo = false;

        const request = indexedDB.open("JWS_KORPASGAT_FIXED", 1);
        request.onupgradeneeded = e => e.target.result.createObjectStore("files", { keyPath: "id" });
        request.onsuccess = e => { db = e.target.result; muatSistem(); };

        function muatSistem() {
            document.getElementById("disp-nama").innerText = localStorage.getItem("nSatuan") || "STAFLOG KORPASGAT";
            document.getElementById("in-nama").value = localStorage.getItem("nSatuan") || "";
            document.getElementById("in-lat").value = localStorage.getItem("lat") || "-7.02";
            document.getElementById("in-lon").value = localStorage.getItem("lon") || "107.52";
            document.getElementById("in-iqo").value = localStorage.getItem("durIqo") || "10";
            
            const store = db.transaction("files", "readonly").objectStore("files");
            store.get('bg').onsuccess = e => {
                if(e.target.result) document.body.style.backgroundImage = `url(${URL.createObjectURL(e.target.result.data)})`;
            };
        }

        function upFile(id, input) {
            const tx = db.transaction("files", "readwrite");
            tx.objectStore("files").put({ id: id, data: input.files[0] });
            alert("File Disimpan!");
        }

        function saveSemua() {
            localStorage.setItem("nSatuan", document.getElementById("in-nama").value);
            localStorage.setItem("lat", document.getElementById("in-lat").value);
            localStorage.setItem("lon", document.getElementById("in-lon").value);
            localStorage.setItem("durIqo", document.getElementById("in-iqo").value);
            location.reload();
        }

        function clock() {
            const now = new Date();
            const jamStr = now.toLocaleTimeString('id-ID', {hour12:false}).replace(/\./g, ':');
            
            if(!isIqo) {
                document.getElementById('jam').innerText = jamStr;
                document.getElementById('jam').style.display = "block";
                document.getElementById('iqomah-box').style.display = "none";
            }
            
            document.getElementById('tgl').innerText = now.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'}).toUpperCase();
            document.getElementById('hijri').innerText = new Intl.DateTimeFormat('id-ID-u-ca-islamic', {day:'numeric', month:'long', year:'numeric'}).format(now).toUpperCase();
        }

        function togglePanel() {
            const p = document.getElementById("panel");
            p.style.display = (p.style.display === "block") ? "none" : "block";
        }

        function startAudio() { document.querySelectorAll("audio").forEach(a => a.play().then(()=>a.pause())); }
            setInterval(clock, 1000);
    </script>
</body>
</html>
