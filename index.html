        :root { 
            --bg-img: url('https://images.unsplash.com/photo-1533106497176-45ae19e68ba2?q=80&w=2070'); 
            --accent: #fbbf24; /* Amber/Jingga Pasgat */
            --dark: #0f172a;
        }

        body { 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), var(--bg-img);

            background-position: center;

            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh; 
        }

        /* Overlay Awal untuk Izin Audio */
        #overlay-mulai {
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.9); z-index: 99999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .clock-section { display: flex; align-items: center; justify-content: center; gap: 40px; margin: 10px 0; }
        #jam { font-size: 8rem; font-weight: 900; line-height: 1; font-family: monospace; text-shadow: 0 0 20px rgba(251, 191, 36, 0.5); }

        #analog-clock { width: 150px; height: 150px; border: 4px solid var(--accent); border-radius: 50%; position: relative; background: rgba(255,255,255,0.05); box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }

        .min-hand { width: 4px; height: 60px; background: #cbd5e1; z-index: 2; }
        .sec-hand { width: 2px; height: 65px; background: #ef4444; z-index: 1; }
        .center-dot { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; }
