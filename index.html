<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWS KORPASGAT V12 - AUDIO COMMAND</title>
    <style>
        :root { --accent: #fbbf24; --bg-dark: rgba(0,0,0,0.85); }
        * { box-sizing: border-box; }
        body { 
            margin: 0; background: #000 no-repeat center fixed; background-size: cover;
            color: white; font-family: 'Segoe UI', Arial, sans-serif; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; cursor: pointer;
        }
        /* Header Satuan */
        .header { padding: 15px; text-align: center; background: rgba(0,0,0,0.7); border-bottom: 4px solid var(--accent); }
        #disp-nama { font-size: 3.5rem; font-weight: 900; color: var(--accent); margin: 0; text-shadow: 2px 2px 10px #000; }
        /* Jam Besar Utama */
        .main-clock { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #jam { font-size: 13rem; font-weight: 900; line-height: 1; margin: 0; filter: drop-shadow(0 0 20px rgba(255,255,255,0.3)); }
        .date-box { font-size: 2rem; font-weight: bold; margin-top: 10px; }
        /* Baris Jadwal Sholat */
        .prayer-row { display: flex; width: 100%; background: var(--bg-dark); border-top: 2px solid var(--accent); }
        .card { flex: 1; padding: 25px 10px; text-align: center; border-right: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .card.active { background: var(--accent); color: #000; }
        .card h3 { margin: 0; font-size: 1.4rem; color: var(--accent); }
        .card.active h3 { color: #000; }
        .card p { margin: 10px 0 0; font-size: 4.5rem; font-weight: 900; }
        marquee { background: #000; color: var(--accent); font-size: 2.5rem; font-weight: bold; padding: 12px 0; border-top: 3px solid var(--accent); }
        /* Panel Setting Komando */
        #btn-set { position: fixed; top: 20px; right: 20px; width: 50px; height: 50px; background: rgba(0,0,0,0.6); border: 2px solid var(--accent); border-radius: 50%; color: var(--accent); z-index: 100; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        #panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #333; padding: 25px; border-radius: 15px; width: 620px; z-index: 1000; box-shadow: 0 0 150px #000; max-height: 90vh; overflow-y: auto; }
        .box-setting { border: 1px solid #cbd5e1; border-radius: 10px; padding: 15px; margin-bottom: 15px; background: #f1f5f9; }
        .input-text { width: 100%; padding: 12px; margin: 8px 0 15px 0; border: 2px solid #cbd5e1; border-radius: 6px; font-size: 16px; }
        .btn-simpan { width: 100%; padding: 15px; background: #0f172a; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .media-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .media-row { padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; background: white; font-size: 12px; }
        .media-row b { display: block; margin-bottom: 5px; color: #1e293b; }
        .tag-status { display: inline-block; margin-top: 5px; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        .st-ok { background: #dcfce7; color: #166534; }
        .st-no { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body onclick="aktifkanAudio()">

    <div id="btn-set" onclick="togglePanel()">⚙️</div>
    <div class="header"><h1 id="disp-nama">STAFLOG KORPASGAT</h1></div>

    <div class="main-clock">
        <div id="jam">00:00:00</div>
        <div class="date-box"><span id="tgl"></span> | <span id="hijri" style="color:var(--accent)"></span></div>
    </div>

    <div class="prayer-row">
        <div class="card" id="c-subuh"><h3>SUBUH</h3><p>04:31</p></div>
        <div class="card" id="c-dzuhur"><h3>DZUHUR</h3><p>11:47</p></div>
