<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>STAFLOG KORPASGAT - FIXED</title>
    <style>
        :root { --bg-img: url('https://images.unsplash.com/photo-1534067783941-51c9c23ecefd?q=80&w=2000'); }
        body { background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), var(--bg-img); background-size: cover; background-position: center; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; height: 100vh; text-align: center; }
        .header { padding: 20px; border-bottom: 2px solid #fbbf24; background: rgba(0,0,0,0.4); }
        #disp-nama { font-size: 2.5rem; color: #fbbf24; margin: 0; letter-spacing: 2px; }
        #jam { font-size: 8rem; font-weight: bold; margin: 10px 0; font-family: monospace; }
        .sholat-grid { display: flex; gap: 15px; padding: 20px; justify-content: center; margin-top: 20px; }
        .box { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; width: 180px; border-bottom: 5px solid #fbbf24; }
        .box h3 { margin: 0; font-size: 1.2rem; opacity: 0.8; }
        .box p { font-size: 2.5rem; margin: 10px 0 0 0; font-weight: bold; }
        #btn-menu { position: fixed; top: 20px; right: 20px; width: 40px; height: 40px; background: rgba(251,191,36,0.3); border: 1px solid #fbbf24; border-radius: 50%; color: white; cursor: pointer; z-index: 100; }
        #admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #333; padding: 20px; border-radius: 10px; width: 400px; z-index: 1000; box-shadow: 0 0 50px black; }
        marquee { position: fixed; bottom: 0; width: 100%; background: #000; padding: 10px; font-size: 1.5rem; border-top: 2px solid #fbbf24; }
    </style>
</head>
<body onclick="startAudioContext()">

    <button id="btn-menu" onclick="toggleAdmin()">⚙️</button>

    <div class="header">
        <h1 id="disp-nama">STAFLOG KORPASGAT</h1>
        <div id="jam">00:00:00</div>
        <div id="tanggal">Memuat Tanggal...</div>
    </div>

    <div class="sholat-grid">
        <div class="box"><h3>SUBUH</h3><p id="subuh">--:--</p></div>
        <div class="box"><h3>DZUHUR</h3><p id="dzuhur">--:--</p></div>
        <div class="box"><h3>ASHAR</h3><p id="ashar">--:--</p></div>
        <div class="box"><h3>MAGHRIB</h3><p id="maghrib">--:--</p></div>
        <div class="box"><h3>ISYA</h3><p id="isya">--:--</p></div>
    </div>

    <marquee id="disp-run">STAFLOG KORPASGAT - DISIPLIN ADALAH NAFASKU</marquee>

    <div id="admin-panel">
        <h3>Pengaturan</h3>
        <input type="text" id="in-nama" placeholder="Nama Instansi" style="width:90%; padding:8px; margin-bottom:10px;">
        <button onclick="simpanSettings()" style="width:100%; padding:10px; background:#22c55e; color:white; border:none; border-radius:5px; cursor:pointer;">SIMPAN</button>
        <button onclick="toggleAdmin()" style="width:100%; margin-top:5px; background:#ddd; border:none; padding:5px;">Tutup</button>
    </div>

    <script>
        // 1. Inisialisasi Data & Database
        let db;
        const request = indexedDB.open("JWS_DB_NEW", 1);
        request.onupgradeneeded = e => e.target.result.createObjectStore("files", { keyPath: "id" });
        request.onsuccess = e => { db = e.target.result; loadPersistedData(); };

        function loadPersistedData() {
            const nama = localStorage.getItem("nama");
            if(nama) document.getElementById("disp-nama").innerText = nama;
            
            // Ambil Background dari DB
            const tx = db.transaction("files", "readonly").objectStore("files");
            tx.get("bg").onsuccess = e => {
                if(e.target.result) {
                    const url = URL.createObjectURL(e.target.result.data);
                    document.documentElement.style.setProperty('--bg-img', `url(${url})`);
                }
            };
        }

        // 2. Fungsi Jam & Tanggal (WAJIB JALAN)
        function updateWaktu() {
            const sekarang = new Date();
            
            // Update Jam
            const h = String(sekarang.getHours()).padStart(2, '0');
            const m = String(sekarang.getMinutes()).padStart(2, '0');
            const s = String(sekarang.getSeconds()).padStart(2, '0');
            document.getElementById('jam').innerText = `${h}:${m}:${s}`;
            
            // Update Tanggal
            const opsi = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('tanggal').innerText = sekarang.toLocaleDateString('id-ID', opsi);
            
            // Hitung Jadwal Sholat setiap jam (menit 0)
            if (sekarang.getMinutes() === 0 && sekarang.getSeconds() === 0) hitungJadwal();
        }

        // 3. Fungsi Jadwal Sholat (Sederhana untuk Test)
        function hitungJadwal() {
            // Logika simulasi jadwal (Anda bisa ganti dengan library PrayTimes)
            document.getElementById("subuh").innerText = "04:35";
            document.getElementById("dzuhur").innerText = "11:52";
            document.getElementById("ashar").innerText = "15:11";
            document.getElementById("maghrib").innerText = "17:48";
            document.getElementById("isya").innerText = "18:59";
        }

        // 4. Admin & Settings
        function toggleAdmin() {
            const p = document.getElementById("admin-panel");
            p.style.display = p.style.display === "block" ? "none" : "block";
        }

        function simpanSettings() {
            const n = document.getElementById("in-nama").value;
            if(n) {
                localStorage.setItem("nama", n);
                document.getElementById("disp-nama").innerText = n;
                alert("Tersimpan!");
                toggleAdmin();
            }
        }

        function startAudioContext() {
            console.log("Audio system ready.");
        }

        // JALANKAN INTERVAL
        setInterval(updateWaktu, 1000);
        updateWaktu(); // Jalankan langsung tanpa tunggu 1 detik
        hitungJadwal(); // Jalankan jadwal
    </script>
</body>
</html>
