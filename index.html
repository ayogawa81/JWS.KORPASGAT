<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>MASTER DISPLAY KOMANDO - STAFLOG KORPASGAT</title>
    <style>
        :root { --bg-img: url('https://unsplash.com'); }
        body { background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), var(--bg-img); background-size: cover; background-position: center; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; height: 100vh; cursor: pointer; }
        .header-top { text-align: center; padding: 10px 0; background: rgba(0,0,0,0.3); border-bottom: 2px solid #fbbf24; }
        #disp-nama { font-size: 2.2rem; color: #fbbf24; margin: 0; text-transform: uppercase; letter-spacing: 3px; }
        .clock-section { display: flex; align-items: center; justify-content: center; gap: 30px; margin: 5px 0; }
        #analog-clock { width: 140px; height: 140px; border: 5px solid #fbbf24; border-radius: 50%; position: relative; background: rgba(255,255,255,0.05); }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 10px; transform: translateX(-50%); }
        .hour-hand { width: 5px; height: 35px; background: #fff; z-index: 3; }
        .min-hand { width: 3px; height: 55px; background: #ddd; z-index: 2; }
        .sec-hand { width: 2px; height: 60px; background: #ff4444; z-index: 1; }
        .center-dot { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: #fbbf24; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; }
        .mark { position: absolute; background: #fbbf24; }
        .m12 { top: 5px; left: 50%; width: 4px; height: 10px; transform: translateX(-50%); }
        .m3 { right: 5px; top: 50%; width: 10px; height: 4px; transform: translateY(-50%); }
        .m6 { bottom: 5px; left: 50%; width: 4px; height: 10px; transform: translateX(-50%); }
        .m9 { left: 5px; top: 50%; width: 10px; height: 4px; transform: translateY(-50%); }
        #jam { font-size: 7rem; font-weight: bold; line-height: 1; }
        .dates-container { text-align: center; margin-bottom: 5px; font-size: 1.3rem; }
        #tanggal { color: #38bdf8; }
        #tanggal-hijri { color: #fbbf24; font-weight: bold; }
        .slide { display: none; height: 48vh; align-items: center; justify-content: center; padding: 0 40px; animation: slideIn 1s; }
        .slide.active { display: flex; flex-direction: column; }
        @keyframes slideIn { from { opacity: 0; } to { opacity: 1; } }
        .sholat-grid { display: flex; gap: 12px; width: 100%; }
        .box { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 15px; border-radius: 20px; flex: 1; text-align: center; border-bottom: 6px solid #fbbf24; }
        .box h3 { font-size: 1.1rem; margin: 0; color: #ccc; }
        .box p { font-size: 2.8rem; margin: 5px 0 0 0; font-weight: bold; }
        .pengumuman-card { background: rgba(251, 191, 36, 0.1); border: 3px solid #fbbf24; padding: 30px; border-radius: 30px; width: 85%; text-align: center; }
        #val-judul { font-size: 2.2rem; color: #fbbf24; margin: 0 0 10px 0; text-transform: uppercase; }
        #val-isi { font-size: 1.8rem; color: white; margin: 0; }
        marquee { font-size: 1.8rem; position: fixed; bottom: 0; background: #000; padding: 12px 0; width: 100%; border-top: 3px solid #fbbf24; }
        #btn-menu { position: fixed; top: 20px; right: 20px; width: 50px; height: 50px; background: rgba(251, 191, 36, 0.3); border: 2px solid #fbbf24; border-radius: 50%; color: #fbbf24; font-size: 25px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        #admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #333; padding: 25px; border-radius: 15px; z-index: 10000; width: 620px; max-height: 85vh; overflow-y: auto; box-shadow: 0 0 100px #000; }
        .group { border: 1px solid #ddd; padding: 12px; margin-bottom: 12px; border-radius: 10px; }
        .group label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 13px; color: #1e293b; }
        input[type="text"], textarea, input[type="number"] { width: 95%; padding: 8px; margin-bottom: 5px; border: 1px solid #ccc; border-radius: 5px; }
        .row-audio { background: #f8fafc; padding: 12px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #fbbf24; }
        .status-badge { font-size: 10px; font-weight: bold; padding: 3px 8px; border-radius: 5px; }
        .btn-blue { padding: 8px 15px; background: #3b82f6; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 11px; }
        .btn-green { padding: 8px 15px; background: #22c55e; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body onclick="aktifkanSuaraSistem()">

    <div id="btn-menu" onclick="bukaSetting()">⚙️</div>

    <div class="header-top">
        <h1 id="disp-nama">STAFLOG KORPASGAT</h1>
        <div class="clock-section">
            <div id="analog-clock">
                <div class="mark m12"></div><div class="mark m3"></div><div class="mark m6"></div><div class="mark m9"></div>
                <div id="h-hand" class="hand hour-hand"></div>
                <div id="m-hand" class="hand min-hand"></div>
                <div id="s-hand" class="hand sec-hand"></div>
                <div class="center-dot"></div>
            </div>
            <div id="jam">00:00:00</div>
        </div>
        <div class="dates-container">
            <span id="tanggal">...</span> | <span id="tanggal-hijri">...</span>
        </div>
    </div>

    <div id="slide-sholat" class="slide active">
        <div class="sholat-grid">
            <div class="box"><h3>SUBUH</h3><p id="subuh">04:35</p></div>
            <div class="box"><h3>DZUHUR</h3><p id="dzuhur">11:51</p></div>
            <div class="box"><h3>ASHAR</h3><p id="ashar">15:11</p></div>
            <div class="box"><h3>MAGHRIB</h3><p id="maghrib">17:48</p></div>
            <div class="box"><h3>ISYA</h3><p id="isya">18:58</p></div>
        </div>
    </div>

    <div id="slide-info" class="slide">
        <div class="pengumuman-card">
            <h1 id="val-judul">PENGUMUMAN</h1>
            <p id="val-isi">Gunakan menu pengaturan untuk merubah teks ini.</p>
        </div>
    </div>

    <marquee id="disp-running">STAFLOG KORPASGAT - DISIPLIN ADALAH NAFASKU</marquee>

    <div id="admin-panel">
        <h2 style="margin:0 0 15px 0; border-bottom:3px solid #fbbf24;">⚙️ Pengaturan Komando</h2>
        <div class="group">
            <label>Teks & BG:</label>
            <input type="text" id="in-nama"><input type="text" id="in-running"><input type="file" id="in-bg">
            <label>Pengumuman Slide 2:</label>
            <input type="text" id="in-judul"><textarea id="in-isi" rows="3"></textarea>
            <button onclick="simpanTeksBG()" style="width:100%; padding:10px; background:#1e293b; color:white; border-radius:8px; cursor:pointer;">✅ SIMPAN TEKS & BG</button>
        </div>
        <div class="group">
            <label>⏱️ Menit Tahrim (Sebelum Adzan):</label>
            <input type="number" id="in-tahrim-min" value="5">
            <label>🔊 Daftar Suara (Wajib Klik Simpan di Setiap Baris):</label>
            <div id="list-audio-container"></div>
        </div>
        <button onclick="tutupSetting()" style="width:100%; border:none; background:none; color:gray; cursor:pointer; margin-top:10px;">TUTUP</button>
    </div>

    <script>
        const audioKeys = ["tahrim", "subuh", "dzuhur", "ashar", "maghrib", "isya"];
        let db;

        const req = indexedDB.open("KorpasgatStable_DB_V1", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("files", { keyPath: "id" });
        req.onsuccess = e => { db = e.target.result; muatData(); };

        function muatData() {
            if(localStorage.getItem("nama")) document.getElementById("disp-nama").innerText = localStorage.getItem("nama");
            if(localStorage.getItem("running")) document.getElementById("disp-running").innerText = localStorage.getItem("running");
            if(localStorage.getItem("judul")) document.getElementById("val-judul").innerText = localStorage.getItem("judul");
            if(localStorage.getItem("isi")) document.getElementById("val-isi").innerText = localStorage.getItem("isi");
            if(localStorage.getItem("tahrim-min")) document.getElementById("in-tahrim-min").value = localStorage.getItem("tahrim-min");

            const tx = db.transaction("files", "readonly").objectStore("files");
            tx.get("bg").onsuccess = e => { if(e.target.result) document.documentElement.style.setProperty('--bg-img', `url(${URL.createObjectURL(e.target.result.data)})`); };
            
            audioKeys.forEach(k => {
                tx.get(k).onsuccess = e => {
                    if(e.target.result) {
                        const a = new Audio(URL.createObjectURL(e.target.result.data));
                        a.id = "play-" + k; document.body.appendChild(a);
                    }
                };
            });
        }

        function buatDaftarAudio() {
            const container = document.getElementById("list-audio-container");
            container.innerHTML = "";
            audioKeys.forEach(k => {
                const isAda = document.getElementById("play-" + k);
                const fname = localStorage.getItem("fname-" + k) || "Belum Ada File";
                container.innerHTML += `
                <div class="row-audio">
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px;"><b>${k.toUpperCase()}</b><span class="status-badge" style="background:${isAda?'#dcfce7':'#fee2e2'}; color:${isAda?'#166534':'#991b1b'}">${isAda?'✅ SIAP':'❌ KOSONG'}</span></div>
                    <div style="display:flex; gap:5px;"><input type="file" id="f-${k}" style="flex:1; font-size:11px;"><button class="btn-blue" onclick="tesSuara('${k}')">TES</button><button class="btn-green" onclick="simpanSuara('${k}')">SIMPAN</button></div>
                    <div style="font-size:10px; color:gray; margin-top:4px;">File: ${fname}</div>
                </div>`;
            });
        }

        function simpanSuara(k) {
            const inp = document.getElementById('f-'+k);
            if(inp.files.length === 0) return alert("Pilih file dulu!");
            // INI PERBAIKANNYA: Mengambil inp.files[0] bukan inp.files
            const fileObj = inp.files[0];
            const tx = db.transaction("files", "readwrite").objectStore("files");
            tx.put({ id: k, data: fileObj }).onsuccess = () => {
                localStorage.setItem("fname-" + k, fileObj.name);
                alert("Berhasil disimpan!"); location.reload();
            };
        }

        function tesSuara(k) {
            const inp = document.getElementById('f-'+k);
            let p = document.getElementById("play-" + k) || new Audio();
            if(inp.files.length > 0) { p.src = URL.createObjectURL(inp.files[0]); p.play(); } 
            else if(p.src) { p.play(); } else { alert("Pilih file!"); }
        }

        function simpanTeksBG() {
            localStorage.setItem("nama", document.getElementById("in-nama").value);
            localStorage.setItem("running", document.getElementById("in-running").value);
            localStorage.setItem("judul", document.getElementById("in-judul").value);
            localStorage.setItem("isi", document.getElementById("in-isi").value);
            localStorage.setItem("tahrim-min", document.getElementById("in-tahrim-min").value);
            const f = document.getElementById('in-bg').files[0];
            if(f) { db.transaction("files", "readwrite").objectStore("files").put({ id: "bg", data: f }).onsuccess = () => location.reload(); } else { alert("Teks tersimpan!"); location.reload(); }
        }

        function aktifkanSuaraSistem() { audioKeys.forEach(k => { const a = document.getElementById("play-"+k); if(a) { a.play().then(()=> {a.pause(); a.currentTime=0;}); } }); }
        function bukaSetting() { document.getElementById("admin-panel").style.display = "block"; buatDaftarAudio(); }
        function tutupSetting() { document.getElementById("admin-panel").style.display = "none"; }

        function update() {
            const d = new Date();
            document.getElementById('jam').innerText = d.toLocaleTimeString('id-ID', {hour12:false});
            document.getElementById('tanggal').innerText = d.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
            const s = d.getSeconds(); const m = d.getMinutes(); const h = d.getHours();
            document.getElementById('s-hand').style.transform = `translateX(-50%) rotate(${s * 6}deg)`;
            document.getElementById('m-hand').style.transform = `translateX(-50%) rotate(${m * 6 + s * 0.1}deg)`;
            document.getElementById('h-hand').style.transform = `translateX(-50%) rotate(${h * 30 + m * 0.5}deg)`;
            const hj = new Intl.DateTimeFormat('id-ID-u-ca-islamic-umalqura', {day:'numeric', month:'long', year:'numeric'}).format(d);
            document.getElementById('tanggal-hijri').innerText = hj.replace('H', '').trim() + " Hijriah";
            
            if(d.getSeconds() === 0) {
                const jm = d.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}).replace('.', ':');
                ["subuh","dzuhur","ashar","maghrib","isya"].forEach(x => {
                    const w = document.getElementById(x).innerText;
                    if(jm === w) {
                        const pt = document.getElementById("play-tahrim"); if(pt) pt.pause();
                        const sound = document.getElementById("play-"+x); if(sound) sound.play();
                    }
                    const [hh, mm] = w.split(':').map(Number);
                    const tT = new Date(); tT.setHours(hh, mm - (localStorage.getItem("tahrim-min") || 5), 0);
                    if(jm === tT.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}).replace('.', ':')) {
                        const ptahrim = document.getElementById("play-tahrim"); if(ptahrim) ptahrim.play();
                    }
                });
            }
        }
        setInterval(update, 1000);
        let slide = 0;
        setInterval(() => {
            const ss = document.querySelectorAll(".slide");
            ss[slide].classList.remove("active");
            slide = (slide + 1) % ss.length;
            ss[slide].classList.add("active");
        }, 25000);
    </script>
</body>
</html>
