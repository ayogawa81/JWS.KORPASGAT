<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWS KORPASGAT - EDISI PRESISI</title>
    <style>
        :root { --accent: #fbbf24; }
        
        body { 
            margin: 0; background: #000 no-repeat center center fixed; background-size: cover;
            color: white; font-family: 'Arial', sans-serif;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column; cursor: pointer;
        }

        /* Header Sesuai Foto */
        .header { padding: 30px 0 10px 0; text-align: center; }
        #disp-nama { font-size: 5.5rem; font-weight: 900; color: var(--accent); margin: 0; letter-spacing: 2px; }

        /* Area Jam Utama */
        .main-display { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        #jam { font-size: 22rem; font-weight: 900; margin: 0; line-height: 0.9; letter-spacing: -5px; }
        #iqomah-box { font-size: 18rem; color: #ff0000; font-weight: 900; display: none; }

        /* Kotak Info Tanggal */
        .info-pill { 
            background: rgba(0,0,0,0.8); border: 3px solid var(--accent); 
            padding: 15px 60px; border-radius: 100px; margin-top: -20px; text-align: center;
        }
        #tgl { font-size: 2.8rem; font-weight: 900; display: block; }
        #hijri { font-size: 2rem; color: var(--accent); font-weight: bold; display: block; margin-top: 5px; }

        /* Baris Jadwal Sholat */
        .prayer-row { display: flex; width: 100%; background: rgba(0,0,0,0.95); border-top: 5px solid var(--accent); }
        .card { flex: 1; padding: 25px 0; text-align: center; border-right: 2px solid #333; }
        .card.active-now { background: #ef4444 !important; }
        .card h3 { margin: 0; font-size: 1.8rem; color: var(--accent); font-weight: 900; }
        .card p { margin: 10px 0 0; font-size: 5.8rem; font-weight: 900; }

        /* Panel Pengaturan */
        #btn-set { position: fixed; top: 30px; right: 30px; z-index: 100; font-size: 35px; opacity: 0.3; }
        #panel { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 580px; max-height: 85vh; background: white; color: #333; padding: 30px; 
            border-radius: 15px; z-index: 1000; box-shadow: 0 0 50px #000; overflow-y: auto;
        }
        input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn-simpan { background: #1c2434; color: white; border: none; padding: 18px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 1.2rem; }
    </style>
</head>
<body onclick="startAudio()">

    <div id="btn-set" onclick="togglePanel()">⚙️</div>

    <div class="header">
        <h1 id="disp-nama">STAFLOG KORPASGAT</h1>
    </div>

    <div class="main-display">
        <div id="jam">00:00:00</div>
        <div id="iqomah-box">00:00</div>
        <div class="info-pill">
            <span id="tgl">SELASA, 28 APRIL 2026</span>
            <span id="hijri">11 ZULKAIDAH 1447 H</span>
        </div>
    </div>

    <div class="prayer-row">
        <div class="card" id="card-subuh"><h3>SUBUH</h3><p id="t-subuh">04:31</p></div>
        <div class="card" id="card-dzuhur"><h3>DZUHUR</h3><p id="t-dzuhur">11:47</p></div>
        <div class="card" id="card-ashar"><h3>ASHAR</h3><p id="t-ashar">15:08</p></div>
        <div class="card" id="card-maghrib"><h3>MAGHRIB</h3><p id="t-maghrib">17:43</p></div>
        <div class="card" id="card-isya"><h3>ISYA</h3><p id="t-isya">18:54</p></div>
    </div>

    <div id="panel">
        <h2 style="text-align:center; margin-top:0;">PENGATURAN DISPLAY</h2>
        <input type="text" id="in-nama" placeholder="Nama Satuan">
        <input type="text" id="in-lat" placeholder="Latitude (Contoh: -7.02)">
        <input type="text" id="in-lon" placeholder="Longitude (Contoh: 107.52)">
        
        <p style="font-weight:bold; margin: 15px 0 5px 0;">Upload Media:</p>
        <div style="font-size:13px; background:#f0f0f0; padding:10px; border-radius:8px;">
            Background: <input type="file" onchange="upFile('bg', this)"><br>
            Adzan Isya: <input type="file" onchange="upFile('a-isya', this)">
        </div>

        <button class="btn-simpan" onclick="saveData()">SIMPAN PERUBAHAN</button>
        <p onclick="togglePanel()" style="text-align:center; cursor:pointer; color:red; margin-top:15px;">[ TUTUP ]</p>
    </div>

    <script>
        let db;
        const request = indexedDB.open("JWS_KORPASGAT_PRO", 1);
        request.onupgradeneeded = e => e.target.result.createObjectStore("files", { keyPath: "id" });
        request.onsuccess = e => { db = e.target.result; muatData(); };

        function muatData() {
            document.getElementById("disp-nama").innerText = localStorage.getItem("nSatuan") || "STAFLOG KORPASGAT";
            document.getElementById("in-nama").value = localStorage.getItem("nSatuan") || "";
            document.getElementById("in-lat").value = localStorage.getItem("lat") || "-7.01";
            document.getElementById("in-lon").value = localStorage.getItem("lon") || "107.55";
            
            const store = db.transaction("files", "readonly").objectStore("files");
            store.get('bg').onsuccess = e => {
                if(e.target.result) document.body.style.backgroundImage = `url(${URL.createObjectURL(e.target.result.data)})`;
            };
        }

        function upFile(id, input) {
            const tx = db.transaction("files", "readwrite");
            tx.objectStore("files").put({ id: id, data: input.files[0] });
            tx.oncomplete = () => { alert("File Berhasil Diupload!"); };
        }

        function saveData() {
            localStorage.setItem("nSatuan", document.getElementById("in-nama").value);
            localStorage.setItem("lat", document.getElementById("in-lat").value);
            localStorage.setItem("lon", document.getElementById("in-lon").value);
            location.reload();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('jam').innerText = now.toLocaleTimeString('id-ID', {hour12:false}).replace(/\./g, ':');
            document.getElementById('tgl').innerText = now.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'}).toUpperCase();
            document.getElementById('hijri').innerText = new Intl.DateTimeFormat('id-ID-u-ca-islamic', {day:'numeric', month:'long', year:'numeric'}).format(now).toUpperCase();
        }

        function togglePanel() {
            const p = document.getElementById("panel");
            p.style.display = (p.style.display === "block") ? "none" : "block";
        }

        function startAudio() { document.querySelectorAll("audio").forEach(a => a.play().then(()=>a.pause())); }
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
