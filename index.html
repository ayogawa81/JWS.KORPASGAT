<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER KOMANDO - STAFLOG KORPASGAT</title>
    <style>
        :root { 
            --bg-img: url('https://images.unsplash.com/photo-1533106497176-45ae19e68ba2?q=80&w=2070'); 
            --accent: #fbbf24; 
            --dark: #0f172a;
        }

        body { 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), var(--bg-img); 
            background-size: cover; 
            background-position: center; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh; 
            cursor: pointer;
        }

        .header-top { text-align: center; padding: 15px 0; background: rgba(0,0,0,0.4); border-bottom: 3px solid var(--accent); }
        #disp-nama { font-size: 2.5rem; color: var(--accent); margin: 0; text-transform: uppercase; letter-spacing: 4px; font-weight: 800; }

        .clock-section { display: flex; align-items: center; justify-content: center; gap: 35px; margin: 10px 0; }
        #jam { font-size: 7.5rem; font-weight: 900; line-height: 1; font-family: 'Courier New', Courier, monospace; }

        #analog-clock { width: 140px; height: 140px; border: 4px solid var(--accent); border-radius: 50%; position: relative; background: rgba(255,255,255,0.05); }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 10px; transform: translateX(-50%); }
        .hour-hand { width: 6px; height: 35px; background: #fff; z-index: 3; }
        .min-hand { width: 4px; height: 55px; background: #ddd; z-index: 2; }
        .sec-hand { width: 2px; height: 60px; background: #ff4444; z-index: 1; }
        .center-dot { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: var(--accent); border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; }

        .dates-container { text-align: center; font-size: 1.4rem; margin-bottom: 5px; }
        #tanggal-hijri { color: var(--accent); font-weight: bold; }

        .slide { display: none; height: 48vh; align-items: center; justify-content: center; padding: 0 40px; animation: slideIn 1s; }
        .slide.active { display: flex; flex-direction: column; }
        @keyframes slideIn { from { opacity: 0; } to { opacity: 1; } }

        .sholat-grid { display: flex; gap: 15px; width: 100%; }
        .box { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; flex: 1; text-align: center; border-bottom: 8px solid var(--accent); }
        .box h3 { margin: 0; font-size: 1.3rem; color: #cbd5e1; }
        .box p { font-size: 3.2rem; margin: 5px 0 0 0; font-weight: 900; }

        #slide-iqomah { background: rgba(0,0,0,0.98); z-index: 9999; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #iqomah-timer { font-size: 18rem; font-weight: 900; color: var(--accent); font-family: monospace; }

        marquee { font-size: 2rem; position: fixed; bottom: 0; background: #000; padding: 15px 0; width: 100%; border-top: 3px solid var(--accent); font-weight: bold; }
