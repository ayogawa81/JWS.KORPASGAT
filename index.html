<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>JWS - STAFLOG KORPASGAT</title>
    <style>
        :root { --bg-img: url('https://images.unsplash.com/photo-1534067783941-51c9c23ecefd?q=80&w=2000'); }
        body { 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), var(--bg-img); 
            background-size: cover; background-position: center; color: white; 
            font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; 
            height: 100vh; text-align: center; cursor: pointer; 
        }
        
        .header { padding: 20px 0; background: rgba(0,0,0,0.5); border-bottom: 4px solid #fbbf24; }
        #disp-nama { font-size: 2.5rem; color: #fbbf24; margin: 0; text-transform: uppercase; letter-spacing: 4px; font-weight: bold; }
        #jam { font-size: 9rem; font-weight: bold; line-height: 1; margin: 10px 0; font-family: 'Courier New', monospace; text-shadow: 0 0 20px rgba(251, 191, 36, 0.5); }
        #tanggal-masehi { font-size: 1.8rem; margin-top: 5px; }
        #tanggal-hijriah { font-size: 1.5rem; color: #fbbf24; margin-top: 5px; font-weight: 500; }

        .sholat-grid { display: flex; gap: 15px; width: 96%; margin: 40px auto; justify-content: center; }
        .box { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); padding: 25px 15px; border-radius: 20px; flex: 1; border-bottom: 8px solid #fbbf24; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .box h3 { margin: 0; font-size: 1.4rem; letter-spacing: 1px; opacity: 0.9; }
        .box p { font-size: 3.5rem; margin: 15px 0 0 0; font-weight: bold; }

        .marquee-container { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; border-top: 4px solid #fbbf24; }
        marquee { font-size: 2rem; padding: 15px 0; display: block; color: white; font-weight: bold; }

        #btn-menu { position: fixed; top: 20px; right: 20px; width: 50px; height: 50px; background: rgba(251, 191, 36, 0.4); border: 2px solid #fbbf24; border-radius: 50%; color: #fbbf24; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        #admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #333; padding: 30px; border-radius: 20px; z-index: 10001; width: 550px; max-height: 85vh; overflow-y: auto; box-shadow: 0 0 100px rgba(0,0,0,0.7); text-align: left; }
        .row-item { background: #f1f5f9; padding: 15px; margin-bottom: 15px; border-radius: 12px; border-left: 6px solid #fbbf24; }
        input[type="text"] { width: 94%; padding: 10px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 6px; }
        .btn-green { background: #22c55e; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-blue { background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-red { background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body onclick="pancingSuara()">

    <div id="btn-menu" onclick="bukaSetting()">⚙️</div>

    <div class="header">
        <h1 id="disp-nama">STAFLOG KORPASGAT</h1>
        <div id="jam">00:00:00</div>
        <div id="tanggal-masehi">Memuat...</div>
        <div id="tanggal-hijriah">Memuat Hijriah...</div>
    </div>

    <div class="sholat-grid">
        <div class="box"><h3>SUBUH</h3><p id="subuh">04:35</p></div>
        <div class="box"><h3>DZUHUR</h3><p id="dzuhur">11:52</p></div>
        <div class="box"><h3>ASHAR</h3><p id="ashar">15:10</p></div>
        <div class="box"><h3>MAGHRIB</h3><p id="maghrib">17:48</p></div>
        <div class="box"><h3>ISYA</h3><p id="isya">18:59</p></div>
    </div>

    <div class="marquee-container">
        <marquee id="disp-run" scrollamount="10">STAFLOG KORPASGAT - DISIPLIN ADALAH NAFASKU</marquee>
    </div>

    <div id="admin-panel">
        <h2 style="margin-top:0; border-bottom:2px solid #fbbf24; padding-bottom:10px;">⚙️ Pengaturan Sistem</h2>
        <div class="row-item">
            <b>Nama Satuan & Teks Berjalan</b><br>
            <input type="text" id="in-nama">
            <input type="text" id="in-run">
            <button class="btn-green" onclick="simpanTeks()">SIMPAN</button>
        </div>
        <div class="row-item">
            <b>Ganti Background</b><br>
            <input type="file" id="in-bg" accept="image/*">
            <button class="btn-blue" onclick="uploadBG()">UPLOAD</button>
        </div>
        <div class="row-item">
            <b>Kontrol Suara Azan</b>
            <div id="audio-list" style="margin-top:10px;"></div>
        </div>
        <button onclick="tutupSetting()" style="width:100%; padding:12px; border:none; background:#e2e8f0; cursor:pointer; font-weight:bold; border-radius:8px;">TUTUP</button>
    </div>

    <script>
        const keys = ["tahrim", "subuh", "dzuhur", "ashar", "maghrib", "isya"];
        let db, audioMap = {};

        const req = indexedDB.open("JWS_FIXED_V3", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("files", { keyPath: "id" });
        req.onsuccess = e => { db = e.target.result; startApp(); };

        function startApp() {
            document.getElementById("disp-nama").innerText = localStorage.getItem("n") || "STAFLOG KORPASGAT";
            document.getElementById("disp-run").innerText = localStorage.getItem("r") || "STAFLOG KORPASGAT - DISIPLIN ADALAH NAFASKU";

            const tx = db.transaction("files", "readonly").objectStore("files");
            tx.get("bg").onsuccess = e => {
                if(e.target.result) document.documentElement.style.setProperty('--bg-img', `url(${URL.createObjectURL(e.target.result.data)})`);
            };

            keys.forEach(k => {
                tx.get(k).onsuccess = e => {
                    if(e.target.result) audioMap[k] = new Audio(URL.createObjectURL(e.target.result.data));
                };
            });

            setInterval(tick, 1000);
            tick();
        }

        function tick() {
            const now = new Date();
            const jamStr = now.toLocaleTimeString('id-ID', {hour12:false}).replace(/\./g,':');
            document.getElementById('jam').innerText = jamStr;
            document.getElementById('tanggal-masehi').innerText = now.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
            
            // Hijriah Otomatis
            const hijri = new Intl.DateTimeFormat('id-TN-u-ca-islamic-uma', {day:'numeric', month:'long', year:'numeric'}).format(now);
            document.getElementById('tanggal-hijriah').innerText = hijri + " H";

            if(now.getSeconds() === 0) {
                const jm = jamStr.substring(0,5);
                ["subuh","dzuhur","ashar","maghrib","isya"].forEach(s => {
                    if(jm === document.getElementById(s).innerText) audioMap[s]?.play();
                });
            }
        }

        function simpanTeks() {
            localStorage.setItem("n", document.getElementById("in-nama").value);
            localStorage.setItem("r", document.getElementById("in-run").value);
            location.reload();
        }

        function uploadBG() {
            const f = document.getElementById("in-bg").files[0];
            if(f) db.transaction("files", "readwrite").objectStore("files").put({id: "bg", data: f}).onsuccess = () => location.reload();
        }

        function uploadAudio(k) {
            const f = document.getElementById('f-'+k).files[0];
            if(f) db.transaction("files", "readwrite").objectStore("files").put({id: k, data: f}).onsuccess = () => location.reload();
        }

        function tes(k) { if(audioMap[k]) { audioMap[k].currentTime = 0; audioMap[k].play(); } else alert("Kosong!"); }
        function stop(k) { if(audioMap[k]) { audioMap[k].pause(); audioMap[k].currentTime = 0; } }

        function buatDaftarAudio() {
            const div = document.getElementById("audio-list");
            div.innerHTML = "";
            keys.forEach(k => {
                const ada = !!audioMap[k];
                div.innerHTML += `
                    <div style="margin-bottom:10px; border-bottom:1px solid #ddd; padding-bottom:8px;">
                        <b>${k.toUpperCase()}</b> <span style="color:${ada?'green':'red'}">${ada?'[ADA]':'[KOSONG]'}</span><br>
                        <input type="file" id="f-${k}" style="font-size:11px;">
                        <div style="margin-top:5px;">
                            <button class="btn-green" onclick="uploadAudio('${k}')" style="font-size:10px;">SAVE</button>
                            <button class="btn-blue" onclick="tes('${k}')" style="font-size:10px;">TES</button>
                            <button class="btn-red" onclick="stop('${k}')" style="font-size:10px;">STOP</button>
                        </div>
                    </div>`;
            });
        }

        function pancingSuara() {
            Object.values(audioMap).forEach(a => { a.play().then(() => { a.pause(); a.currentTime = 0; }).catch(() => {}); });
        }

        function bukaSetting() {
            document.getElementById("admin-panel").style.display = "block";
            document.getElementById("in-nama").value = localStorage.getItem("n") || "";
            document.getElementById("in-run").value = localStorage.getItem("r") || "";
            buatDaftarAudio();
        }
        function tutupSetting() { document.getElementById("admin-panel").style.display = "none"; }
    </script>
</body>
</html>
