<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWS KORPASGAT V32 FINAL</title>
    <style>
        :root { --accent: #fbbf24; --active: #ef4444; }
        body { 
            margin: 0; background-color: #000; background-repeat: no-repeat; 
            background-position: center; background-attachment: fixed; background-size: cover;
            color: white; font-family: 'Arial', sans-serif; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; cursor: pointer;
        }
        .header { padding: 10px; text-align: center; background: rgba(0,0,0,0.8); border-bottom: 4px solid var(--accent); }
        #disp-nama { font-size: 3.5rem; font-weight: 900; color: var(--accent); margin: 0; text-transform: uppercase; }
        .main-clock { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-shadow: 4px 4px 15px rgba(0,0,0,1); }
        #jam { font-size: 12rem; font-weight: 900; margin: 0; font-family: monospace; letter-spacing: -5px; }
        .date-box { font-size: 2rem; font-weight: bold; background: rgba(0,0,0,0.6); padding: 10px 30px; border-radius: 50px; border: 1px solid var(--accent); }
        .prayer-row { display: flex; width: 100%; background: rgba(0,0,0,0.9); border-top: 4px solid var(--accent); }
        .card { flex: 1; padding: 20px 10px; text-align: center; border-right: 1px solid #333; }
        .card.active-now { background: var(--active) !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .card h3 { margin: 0; font-size: 1.3rem; color: var(--accent); }
        .card p { margin: 5px 0 0; font-size: 3.5rem; font-weight: 900; }
        marquee { background: #000; color: var(--accent); font-size: 2.5rem; font-weight: bold; padding: 10px 0; border-top: 4px solid var(--accent); }
        #btn-set { position: fixed; top: 20px; right: 20px; cursor: pointer; z-index: 100; font-size: 30px; opacity: 0.5; }
        
        /* PANEL PENGATURAN */
        #panel { display: none; position: fixed; top: 5%; left: 5%; width: 90%; height: 85%; background: #f4f4f4; color: #333; padding: 25px; border-radius: 15px; z-index: 1000; overflow-y: auto; box-shadow: 0 0 100px #000; }
        .box { border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; border-radius: 8px; background: white; }
        .box b { display: block; margin-bottom: 10px; color: #1e3a8a; border-left: 5px solid var(--accent); padding-left: 10px; font-size: 1.2rem; }
        .audio-label { display: block; font-weight: bold; margin-top: 10px; font-size: 0.9rem; color: #555; }
        input { width: 95%; padding: 10px; margin-bottom: 5px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        .btn-save { background: #1e3a8a; color: white; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 20px; margin-top: 10px; }
    </style>
</head>
<body onclick="startAudio()">

    <div id="btn-set" onclick="togglePanel()">⚙️</div>
    <div class="header"><h1 id="disp-nama">STAFLOG KORPASGAT</h1></div>

    <div class="main-clock">
        <div id="jam">00:00:00</div>
        <div class="date-box"><span id="tgl"></span> | <span id="hijri" style="color:var(--accent)"></span></div>
    </div>

    <div class="prayer-row">
        <div class="card" id="card-subuh"><h3>SUBUH</h3><p id="t-subuh">--:--</p></div>
        <div class="card" id="card-dzuhur"><h3>DZUHUR</h3><p id="t-dzuhur">--:--</p></div>
        <div class="card" id="card-ashar"><h3>ASHAR</h3><p id="t-ashar">--:--</p></div>
        <div class="card" id="card-maghrib"><h3>MAGHRIB</h3><p id="t-maghrib">--:--</p></div>
        <div class="card" id="card-isya"><h3>ISYA</h3><p id="t-isya">--:--</p></div>
    </div>

    <marquee id="disp-run">KOMANDO!</marquee>

    <div id="panel">
        <h2 style="text-align:center;">⚙️ PENGATURAN JWS</h2>
        <div class="box">
            <b>Identitas & Lokasi</b>
            <label class="audio-label">Nama Satuan:</label>
            <input type="text" id="in-nama">
            <label class="audio-label">Running Text:</label>
            <input type="text" id="in-run">
            <label class="audio-label">Latitude / Longitude:</label>
            <input type="text" id="in-lat">
            <input type="text" id="in-lon">
        </div>
        <div class="box">
            <b>🖼️ Background</b>
            <label class="audio-label">URL Gambar Latar:</label>
            <input type="text" id="url-bg">
        </div>
        <div class="box">
            <b>🕌 Media Audio (Internal GitHub)</b>
            <label class="audio-label">Audio Tahrim:</label>
            <input type="text" id="url-tahrim">
            <label class="audio-label">Adzan Subuh:</label>
            <input type="text" id="url-subuh">
            <label class="audio-label">Adzan Dzuhur:</label>
            <input type="text" id="url-dzuhur">
            <label class="audio-label">Adzan Ashar:</label>
            <input type="text" id="url-ashar">
            <label class="audio-label">Adzan Maghrib:</label>
            <input type="text" id="url-maghrib">
            <label class="audio-label">Adzan Isya:</label>
            <input type="text" id="url-isya">
        </div>
        <button class="btn-save" onclick="saveData()">SIMPAN & REFRESH</button>
        <p style="text-align:center; color:gray; cursor:pointer;" onclick="togglePanel()">[ TUTUP ]</p>
    </div>

    <script>
        const audioPlayer = new Audio();

        function muatSistem() {
            const keys = ["nSatuan", "tJalan", "lat", "lon", "urlBg", "urlTahrim", "urlSubuh", "urlDzuhur", "urlAshar", "urlMaghrib", "urlIsya"];
            const ids = ["in-nama", "in-run", "in-lat", "in-lon", "url-bg", "url-tahrim", "url-subuh", "url-dzuhur", "url-ashar", "url-maghrib", "url-isya"];
            
            // Nama file disesuaikan persis dengan hasil unggahan Anda di GitHub
            const defaults = [
                "STAFLOG KORPASGAT", 
                "Jika pekerjaan adalah alasan kenapa kamu melewatkan salat, maka tidak akan ada keberkahan dari penghasilan yang kamu peroleh.", 
                "-7.01", "107.551",
                "https://i.postimg.cc/T32xKDtZ/Picture2.jpg",
                "Tarhim.mp3", "subuh.mp3", "dzuhur.mp3", "Ashar.mp3", "Magrib.mp3", "Isya.mp3"
            ];

            keys.forEach((k, i) => {
                let val = localStorage.getItem(k);
                // Paksa ganti jika kosong atau masih mengandung link Google Drive lama
                if(!val || val.trim() === "" || val.includes("drive.google.com")) {
                    val = defaults[i];
                    localStorage.setItem(k, val);
                }
                document.getElementById(ids[i]).value = val;
            });

            document.getElementById("disp-nama").innerText = localStorage.getItem("nSatuan");
            document.getElementById("disp-run").innerText = localStorage.getItem("tJalan");
            document.body.style.backgroundImage = "url('" + localStorage.getItem("urlBg") + "')";
            hitungJadwal();
        }

        function hitungJadwal() {
            const lon = parseFloat(localStorage.getItem("lon")) || 107.551;
            const selisih = Math.floor((lon - 107.551) * 4); 
            const base = { subuh:"04:31", dzuhur:"11:47", ashar:"15:08", maghrib:"17:43", isya:"18:54" };
            for (let k in base) {
                let [h, m] = base[k].split(':').map(Number);
                let total = (h * 60 + m) - selisih;
                document.getElementById('t-'+k).innerText = String(Math.floor(total/60)).padStart(2,'0')+":"+String(total%60).padStart(2,'0');
            }
        }

        function updateJam() {
            const now = new Date();
            const jamStr = now.toLocaleTimeString('id-ID', {hour12:false}).replace(/\./g, ':');
            const detik = now.getSeconds();
            
            document.getElementById('jam').innerText = jamStr;
            document.getElementById('tgl').innerText = now.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
            document.getElementById('hijri').innerText = new Intl.DateTimeFormat('id-ID-u-ca-islamic', {day:'numeric', month:'long', year:'numeric'}).format(now);

            const jm = jamStr.substring(0, 5);
            ["subuh", "dzuhur", "ashar", "maghrib", "isya"].forEach(key => {
                const pTime = document.getElementById('t-' + key).innerText;
                const card = document.getElementById("card-" + key);

                if (detik === 0) {
                    let [h, m] = pTime.split(':').map(Number);
                    if ((now.getHours()*60 + now.getMinutes()) === (h*60 + m - 3)) {
                        playAudio(localStorage.getItem("urlTahrim"));
                    }
                    if(pTime === jm) {
                        const storageKey = "url" + key.charAt(0).toUpperCase() + key.slice(1);
                        playAudio(localStorage.getItem(storageKey));
                    }
                }
                if(pTime === jm) card.classList.add('active-now');
                else card.classList.remove('active-now');
            });
        }

        function playAudio(file) {
            if(!file) return;
            audioPlayer.src = file;
            audioPlayer.load();
            audioPlayer.play().catch(e => console.log("Klik layar!"));
        }

        function saveData() {
            const keys = ["nSatuan", "tJalan", "lat", "lon", "urlBg", "urlTahrim", "urlSubuh", "urlDzuhur", "urlAshar", "urlMagh
